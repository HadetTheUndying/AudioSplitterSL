name: Build AudioSplitter

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: AudioSplitter
            asset_name: AudioSplitter-macOS
          - os: windows-latest
            artifact_name: AudioSplitter.exe
            asset_name: AudioSplitter-Windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp pyinstaller

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name AudioSplitter \
            --clean \
            audio_splitter.py
        shell: bash

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: mv dist/AudioSplitter dist/${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist\AudioSplitter.exe dist\${{ matrix.asset_name }}
        shell: cmd

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
