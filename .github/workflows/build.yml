name: Build AudioSplitter

# Triggers:
#   - Push a version tag (e.g. git tag v1.0.0 && git push --tags)
#     → builds executables and attaches them to a GitHub Release
#   - Manual trigger from the Actions tab (no release created)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: AudioSplitter
            asset_name: AudioSplitter-macOS
          - os: windows-latest
            artifact_name: AudioSplitter.exe
            asset_name: AudioSplitter-Windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp pyinstaller

      # ── Disable Windows Defender ──────────────────────────────────────────────
      # Defender's real-time scanning frequently cancels PyInstaller mid-build
      # by flagging the PKG assembly step. Safe to disable on ephemeral runners.
      - name: Disable Windows Defender (Windows only)
        if: runner.os == 'Windows'
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      # ── Build (macOS) ─────────────────────────────────────────────────────────
      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name AudioSplitter \
            --clean \
            audio_splitter.py

      # ── Build (Windows) ───────────────────────────────────────────────────────
      # --noupx           skips UPX compression which Defender also targets
      # --exclude-module  strips heavy unused packages to reduce memory pressure
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name AudioSplitter `
            --clean `
            --noupx `
            --exclude-module matplotlib `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module PIL `
            audio_splitter.py

      # ── Rename artifacts ──────────────────────────────────────────────────────
      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: mv dist/AudioSplitter dist/${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: mv dist\AudioSplitter.exe "dist\${{ matrix.asset_name }}"

      # ── Upload artifact (always) ──────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 30

      # ── Attach to GitHub Release (tag pushes only) ────────────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
