name: Build AudioSplitter

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            asset_name: AudioSplitter-macOS.zip
          - os: windows-latest
            asset_name: AudioSplitter-Windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp pyinstaller Pillow

      - name: Disable Windows Defender (Windows only)
        if: runner.os == 'Windows'
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      # Generate icons — macOS uses iconutil for a real .icns
      - name: Generate icons (macOS)
        if: runner.os == 'macOS'
        run: python generate_icons.py

      - name: Generate icons (Windows)
        if: runner.os == 'Windows'
        run: python generate_icons.py

      # ── macOS build — onedir + .app bundle ─────────────────────────────────
      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller \
            --windowed \
            --onedir \
            --name AudioSplitter \
            --clean \
            --icon icon.icns \
            --osx-bundle-identifier com.audiosplitter.app \
            audio_splitter.py

      # ── Windows build — onefile ─────────────────────────────────────────────
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name AudioSplitter `
            --clean `
            --noupx `
            --icon icon.ico `
            --exclude-module matplotlib `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module PIL `
            audio_splitter.py

      # ── Package artifacts ───────────────────────────────────────────────────
      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x dist/AudioSplitter.app/Contents/MacOS/AudioSplitter
          cd dist && zip -r AudioSplitter-macOS.zip AudioSplitter.app
          mv AudioSplitter-macOS.zip ../

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: mv dist\AudioSplitter.exe "dist\AudioSplitter-Windows.exe"

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload build artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: AudioSplitter-macOS
          path: AudioSplitter-macOS.zip
          retention-days: 30

      - name: Upload build artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: AudioSplitter-Windows
          path: dist/AudioSplitter-Windows.exe
          retention-days: 30

      # ── Attach to GitHub Release (tag pushes only) ──────────────────────────
      - name: Upload to GitHub Release (macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: AudioSplitter-macOS.zip
          generate_release_notes: true

      - name: Upload to GitHub Release (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AudioSplitter-Windows.exe
          generate_release_notes: true
